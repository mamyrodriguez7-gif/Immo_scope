<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Graphes interactifs</title>
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<style>
.tab {
  overflow: hidden;
  border-bottom: 1px solid #ccc;
}
.tab button {
  background-color: inherit;
  border: none;
  outline: none;
  cursor: pointer;
  padding: 10px 20px;
  transition: 0.3s;
  font-size: 16px;
}
.tab button:hover { background-color: #ddd; }
.tab button.active { background-color: #ccc; }
.tabcontent {
  display: none;
  padding: 10px 0;
}
</style>
</head>
<body>

<h1>Graphes interactifs</h1>

<div class="tab">
  <button class="tablinks" onclick="openTab(event, 'Carte')" id="defaultOpen">Carte</button>
  <button class="tablinks" onclick="openTab(event, 'Histogramme')">Histogramme</button>
  <button class="tablinks" onclick="openTab(event, 'Nuage')">Nuage</button>
</div>

<div id="Carte" class="tabcontent">
  <!-- Insérer le snippet de la carte -->
  <!-- contenu de snippets/map.html -->
  <!-- Exemple : -->
  <div id="map-container"></div>
</div>

<div id="Histogramme" class="tabcontent">
  <!-- Insérer le snippet de l'histogramme -->
  <div id="hist-container"></div>
</div>

<div id="Nuage" class="tabcontent">
  <!-- Insérer le snippet du nuage de points -->
  <div id="scatter-container"></div>
</div>

<script>
// Fonction onglets
function openTab(evt, tabName) {
  var i, tabcontent, tablinks;
  tabcontent = document.getElementsByClassName("tabcontent");
  for (i=0; i<tabcontent.length; i++) { tabcontent[i].style.display = "none"; }
  tablinks = document.getElementsByClassName("tablinks");
  for (i=0; i<tablinks.length; i++) { tablinks[i].className = tablinks[i].className.replace(" active", ""); }
  document.getElementById(tabName).style.display = "block";
  evt.currentTarget.className += " active";
}
// Onglet par défaut
document.getElementById("defaultOpen").click();
</script>

</body>
</html>
